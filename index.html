<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
    <title>InstrumentPro · Complete Toolbox</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #f2f5f9;
            color: #1c2a44;
            padding: 0 0 80px 0;
            max-width: 480px;
            margin: 0 auto;
            transition: background 0.3s, color 0.3s;
        }
        body.dark {
            background: #0f172a;
            color: #e2e8f0;
        }
        body.dark .card,
        body.dark .search-bar,
        body.dark .quick-item,
        body.dark .greeting,
        body.dark .result-box,
        body.dark .cal-point,
        body.dark .trouble-item,
        body.dark .dp-diagram,
        body.dark .segmented {
            background: #1e293b;
            border-color: #334155;
            color: #e2e8f0;
        }
        body.dark .card-header span,
        body.dark .chip,
        body.dark .result-box span:last-child {
            color: #94a3b8;
        }
        body.dark .btn {
            background: #2563eb;
        }
        body.dark .btn-outline {
            background: transparent;
            color: #60a5fa;
            border-color: #3b82f6;
        }
        body.dark input,
        body.dark select {
            background: #0f172a;
            color: #e2e8f0;
            border-color: #334155;
        }
        body.dark .dp-diagram {
            background: #1a253a;
        }
        body.dark .greeting {
            background: linear-gradient(145deg, #0f2b44, #1a365d);
        }

        /* ===== TOP GREETING ===== */
        .greeting {
            background: linear-gradient(145deg, #1e3a5f, #0f2b44);
            color: white;
            padding: 20px 18px 16px 18px;
            border-radius: 28px;
            margin: 12px 12px 16px 12px;
            box-shadow: 0 6px 16px rgba(0, 20, 40, 0.15);
        }
        .greeting-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .greeting h1 {
            font-weight: 600;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
        }
        .greeting h1 i {
            margin-right: 8px;
            color: #7fc9ff;
        }
        .greeting .sub {
            opacity: 0.8;
            font-size: 0.9rem;
            margin-top: 4px;
        }
        .greeting .dark-toggle {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* ===== SEARCH ===== */
        .search-bar {
            background: white;
            border-radius: 40px;
            padding: 6px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0 12px 16px 12px;
            border: 1px solid #e9edf3;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
        }
        .search-bar i {
            color: #94a3b8;
        }
        .search-bar input {
            border: none;
            background: transparent;
            padding: 10px 0;
            width: 100%;
            font-size: 0.95rem;
            outline: none;
        }

        /* ===== QUICK ACCESS ===== */
        .quick-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 0 12px;
            margin-bottom: 20px;
        }
        .quick-item {
            background: white;
            border-radius: 16px;
            padding: 14px 4px;
            text-align: center;
            border: 1px solid #eef2f6;
            cursor: pointer;
            transition: 0.15s;
            font-size: 0.7rem;
            font-weight: 500;
        }
        .quick-item i {
            display: block;
            font-size: 1.6rem;
            margin-bottom: 4px;
            color: #1e3a5f;
        }
        .quick-item:active {
            transform: scale(0.94);
        }
        .quick-item.color-1 i {
            color: #2563eb;
        }
        .quick-item.color-2 i {
            color: #7c3aed;
        }
        .quick-item.color-3 i {
            color: #059669;
        }
        .quick-item.color-4 i {
            color: #b45309;
        }

        /* ===== RECENT TOOLS ===== */
        .recent-tools {
            padding: 0 12px;
            margin-bottom: 20px;
        }
        .recent-tools .chip {
            background: #eef2f6;
            border-radius: 40px;
            padding: 4px 14px;
            font-size: 0.75rem;
            display: inline-block;
            margin: 3px 4px 3px 0;
        }
        body.dark .recent-tools .chip {
            background: #334155;
            color: #e2e8f0;
        }

        /* ===== CARDS ===== */
        .card {
            background: white;
            border-radius: 24px;
            padding: 16px 18px;
            margin: 0 12px 16px 12px;
            border: 1px solid #e9edf3;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }
        .card-header i {
            font-size: 1.4rem;
            color: #1e3a5f;
            width: 30px;
        }
        .card-header h3 {
            font-weight: 600;
            font-size: 1.05rem;
        }
        .card-header span {
            margin-left: auto;
            color: #94a3b8;
            font-size: 0.7rem;
            background: #f1f5f9;
            padding: 2px 12px;
            border-radius: 30px;
        }

        /* ===== SEGMENTED CONTROL ===== */
        .segmented {
            display: flex;
            background: #f1f5f9;
            border-radius: 40px;
            padding: 3px;
            margin-bottom: 14px;
        }
        .segmented button {
            flex: 1;
            border: none;
            background: transparent;
            padding: 8px 0;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.8rem;
            color: #64748b;
            cursor: pointer;
            transition: 0.2s;
        }
        .segmented button.active {
            background: white;
            color: #1e3a5f;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
        }
        body.dark .segmented {
            background: #334155;
        }
        body.dark .segmented button.active {
            background: #1e293b;
            color: #e2e8f0;
        }

        /* ===== ROW / INPUTS ===== */
        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 12px;
            margin-bottom: 12px;
            align-items: center;
        }
        .row label {
            font-weight: 500;
            font-size: 0.85rem;
            color: #475569;
            min-width: 60px;
        }
        .row input,
        .row select {
            flex: 1;
            padding: 8px 14px;
            border: 1px solid #dce1e9;
            border-radius: 40px;
            background: #fafcff;
            font-size: 0.9rem;
            outline: none;
            min-width: 60px;
        }
        .row input:focus,
        .row select:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
        }
        .row .unit-label {
            font-size: 0.8rem;
            color: #64748b;
            font-weight: 500;
        }
        .result-box {
            background: #f1f6fd;
            padding: 10px 16px;
            border-radius: 40px;
            margin-top: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .result-box span:last-child {
            font-size: 1.1rem;
            font-weight: 600;
            color: #0b2d4e;
        }

        /* ===== BUTTONS ===== */
        .btn {
            background: #1e3a5f;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn i {
            color: white;
        }
        .btn-outline {
            background: transparent;
            color: #1e3a5f;
            border: 1px solid #b6c9e0;
        }
        .btn-outline i {
            color: #1e3a5f;
        }
        .btn-sm {
            padding: 4px 14px;
            font-size: 0.75rem;
        }
        .btn:active {
            transform: scale(0.95);
        }

        /* ===== CALIBRATION POINTS ===== */
        .cal-points-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px 12px;
            margin: 8px 0;
        }
        .cal-point {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8fafd;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
        }
        .cal-point input {
            width: 60px;
            padding: 4px 8px;
            border: 1px solid #dce1e9;
            border-radius: 20px;
            text-align: center;
            font-size: 0.8rem;
            background: white;
        }

        /* ===== DP DIAGRAM ===== */
        .dp-diagram {
            background: #eaf0f8;
            padding: 16px;
            border-radius: 32px;
            text-align: center;
            font-family: monospace;
            font-size: 1.1rem;
            line-height: 1.8;
            letter-spacing: 1px;
            color: #0b2d4e;
            margin-top: 6px;
        }
        .dp-diagram .port-label {
            font-size: 0.75rem;
            font-family: sans-serif;
            background: rgba(255, 255, 255, 0.6);
            padding: 2px 12px;
            border-radius: 20px;
            display: inline-block;
            margin: 2px 4px;
        }

        /* ===== TABS (horizontal scrolling) ===== */
        .tab-scroll {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 4px 0 10px 0;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .tab-scroll::-webkit-scrollbar {
            display: none;
        }
        .tab-scroll .tab {
            white-space: nowrap;
            background: #f1f5f9;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #475569;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.15s;
        }
        .tab-scroll .tab.active {
            background: #1e3a5f;
            color: white;
            border-color: #1e3a5f;
        }
        body.dark .tab-scroll .tab {
            background: #334155;
            color: #cbd5e1;
        }
        body.dark .tab-scroll .tab.active {
            background: #2563eb;
            color: white;
        }

        /* ===== TROUBLE ITEMS ===== */
        .trouble-item {
            background: #f8fafd;
            padding: 8px 14px;
            border-radius: 40px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 3px solid #1e3a5f;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .trouble-item:active {
            background: #eef2f6;
        }

        /* ===== STATUS BADGE ===== */
        .badge {
            font-size: 0.65rem;
            padding: 2px 12px;
            border-radius: 30px;
            font-weight: 600;
        }
        .badge-pass {
            background: #d1fae5;
            color: #065f46;
        }
        .badge-fail {
            background: #fee2e2;
            color: #991b1b;
        }
        .badge-warn {
            background: #fef3c7;
            color: #92400e;
        }

        /* ===== CHIPS ===== */
        .chip {
            background: #eef2f6;
            border-radius: 40px;
            padding: 2px 12px;
            font-size: 0.7rem;
            display: inline-block;
            margin: 2px 3px 2px 0;
            font-weight: 500;
        }

        /* ===== BOTTOM TAB BAR ===== */
        .bottom-tabs {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 480px;
            margin: 0 auto;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 6px 0 10px 0;
            border-top: 1px solid #e9edf3;
            box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.04);
            z-index: 100;
        }
        .bottom-tabs .tab-item {
            text-align: center;
            font-size: 0.6rem;
            color: #94a3b8;
            cursor: pointer;
            padding: 2px 10px;
            transition: 0.15s;
            border: none;
            background: transparent;
        }
        .bottom-tabs .tab-item i {
            display: block;
            font-size: 1.2rem;
            margin-bottom: 2px;
        }
        .bottom-tabs .tab-item.active {
            color: #1e3a5f;
            font-weight: 600;
        }
        body.dark .bottom-tabs {
            background: #1e293b;
            border-top-color: #334155;
        }
        body.dark .bottom-tabs .tab-item.active {
            color: #60a5fa;
        }

        /* ===== AI CHAT (mock) ===== */
        .chat-bubble {
            background: #e8f0fe;
            border-radius: 16px 16px 16px 4px;
            padding: 10px 14px;
            margin: 4px 0;
            font-size: 0.85rem;
            max-width: 85%;
        }
        .chat-bubble.user {
            background: #1e3a5f;
            color: white;
            border-radius: 16px 16px 4px 16px;
            margin-left: auto;
        }
        body.dark .chat-bubble {
            background: #1a253a;
            color: #e2e8f0;
        }
        body.dark .chat-bubble.user {
            background: #2563eb;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 420px) {
            .quick-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .cal-points-grid {
                grid-template-columns: 1fr;
            }
            .row {
                flex-direction: column;
                align-items: stretch;
            }
            .row label {
                min-width: auto;
            }
        }

        /* ===== UTILITY ===== */
        .mt-1 {
            margin-top: 8px;
        }
        .mb-1 {
            margin-bottom: 8px;
        }
        .flex {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }
        .gap-1 {
            gap: 6px;
        }
        .text-center {
            text-align: center;
        }
        .w-full {
            width: 100%;
        }
        .hidden {
            display: none !important;
        }
        hr {
            border: none;
            border-top: 1px solid #e9edf3;
            margin: 14px 0;
        }
        body.dark hr {
            border-color: #334155;
        }

        /* Scrollable sections */
        .scroll-x {
            overflow-x: auto;
            white-space: nowrap;
            padding: 4px 0;
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body>

    <!-- ========================================================== -->
    <!-- TOP GREETING + DARK MODE TOGGLE -->
    <!-- ========================================================== -->
    <div class="greeting">
        <div class="greeting-top">
            <h1><i class="fas fa-toolbox"></i>InstrumentPro</h1>
            <button class="dark-toggle" id="darkToggle"><i class="fas fa-moon"></i> Dark</button>
        </div>
        <div class="sub"><i class="fas fa-sun" id="greetingIcon"></i> <span id="greetingText">Good Morning</span> · What do you need?</div>
    </div>

    <!-- ========================================================== -->
    <!-- SEARCH -->
    <!-- ========================================================== -->
    <div class="search-bar">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search tools, references, faults..." />
    </div>

    <!-- ========================================================== -->
    <!-- QUICK ACCESS (colored icons) -->
    <!-- ========================================================== -->
    <div class="quick-grid" id="quickAccess">
        <div class="quick-item color-1" data-target="converter"><i class="fas fa-arrows-alt-h"></i> Converter</div>
        <div class="quick-item color-2" data-target="calibration"><i class="fas fa-sliders-h"></i> Calibration</div>
        <div class="quick-item color-3" data-target="dp"><i class="fas fa-tachometer-alt"></i> Level DP</div>
        <div class="quick-item color-4" data-target="flow"><i class="fas fa-water"></i> Flow</div>
        <div class="quick-item color-1" data-target="electrical"><i class="fas fa-bolt"></i> Electrical</div>
        <div class="quick-item color-2" data-target="references"><i class="fas fa-book"></i> References</div>
        <div class="quick-item color-3" data-target="trouble"><i class="fas fa-exclamation-triangle"></i> Fault</div>
        <div class="quick-item color-4" data-target="ai"><i class="fas fa-robot"></i> AI Chat</div>
    </div>

    <!-- ========================================================== -->
    <!-- RECENT TOOLS -->
    <!-- ========================================================== -->
    <div class="recent-tools">
        <span style="font-size:0.75rem; font-weight:600; color:#64748b;">RECENT TOOLS</span>
        <div>
            <span class="chip">4-20mA Calc</span>
            <span class="chip">Pressure → PSI</span>
            <span class="chip">DP Level</span>
            <span class="chip">Calibration 5pt</span>
        </div>
    </div>

    <!-- ========================================================== -->
    <!-- 1. UNIT CONVERTER (LIVE) -->
    <!-- ========================================================== -->
    <div id="converter" class="section-title" style="padding:0 12px 8px 12px;">
        <h2 style="font-size:1.1rem;"><i class="fas fa-arrows-alt-h"></i> Unit Converter</h2>
    </div>
    <div class="card">
        <div class="card-header"><i class="fas fa-weight"></i><h3>Pressure</h3><span>psi · bar · kPa</span></div>
        <div class="row">
            <label>From</label>
            <select id="fromUnit">
                <option value="psi">PSI</option><option value="bar" selected>bar</option>
                <option value="kpa">kPa</option><option value="mpa">MPa</option><option value="atm">atm</option>
            </select>
            <input type="number" id="inputVal" value="1" step="any" />
        </div>
        <div class="row">
            <label>To</label>
            <select id="toUnit">
                <option value="psi">PSI</option><option value="bar">bar</option>
                <option value="kpa" selected>kPa</opt
